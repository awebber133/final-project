apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sunrise-quote-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-username>/<your-repo>.git
    targetRevision: gitops-argo
    path: helm-chart
    helm:
      releaseName: sunrise-quote-app
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins-deploy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
