apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/awebber133/final-project.git
    targetRevision: gitops-argo
    path: k8s/app
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
